name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "DWG_Renamer" dwg_renamer.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DWG_Renamer
          path: dist/DWG_Renamer.exe
